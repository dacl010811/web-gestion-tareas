<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestor de Tareas — Dashboard</title>
    <meta name="description" content="Organiza tu día de manera eficiente con este gestor de tareas premium." />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --background: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.6);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --border-focus: #a78bfa;
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, var(--background) 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* Decorative background glows */
        .glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.12) 0%, rgba(0,0,0,0) 70%);
            top: -10%;
            left: 10%;
            z-index: 0;
            pointer-events: none;
        }

        .glow-2 {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(167, 139, 250, 0.08) 0%, rgba(0,0,0,0) 70%);
            bottom: -10%;
            right: 10%;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 800px;
            z-index: 1;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 40px;
            transition: border-color 0.3s ease;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                padding: 30px 20px;
                gap: 30px;
            }
        }

        .container:hover {
            border-color: rgba(255, 255, 255, 0.12);
        }

        /* Form Column */
        .form-col h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 0%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-col .subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 24px;
            font-weight: 300;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input, textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: var(--border-focus);
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }

        textarea {
            resize: none;
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
            color: #fff;
            border: none;
            padding: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.25);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(139, 92, 246, 0.4);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* List Column */
        .list-col {
            display: flex;
            flex-direction: column;
            border-left: 1px solid rgba(255, 255, 255, 0.08);
            padding-left: 40px;
        }

        @media (max-width: 768px) {
            .list-col {
                border-left: none;
                padding-left: 0;
                border-top: 1px solid rgba(255, 255, 255, 0.08);
                padding-top: 30px;
            }
        }

        .list-col h2 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .tasks-container {
            flex: 1;
            overflow-y: auto;
            max-height: 380px;
            padding-right: 8px;
        }

        /* Custom Scrollbar */
        .tasks-container::-webkit-scrollbar {
            width: 6px;
        }
        .tasks-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 3px;
        }
        .tasks-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }
        .tasks-container::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .empty-state {
            color: var(--text-muted);
            text-align: center;
            font-size: 0.9rem;
            padding: 40px 10px;
            font-weight: 300;
        }

        .task-item {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .task-item:hover {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(15, 23, 42, 0.5);
        }

        .task-item.completed {
            opacity: 0.6;
            background: rgba(15, 23, 42, 0.2);
        }

        .task-item.completed .task-title {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .task-item.completed .task-desc {
            text-decoration: line-through;
        }

        .task-left {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        /* Custom Checkbox */
        .chk-container {
            display: block;
            position: relative;
            padding-left: 24px;
            cursor: pointer;
            user-select: none;
            margin-top: 2px;
        }

        .chk-container input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .checkmark {
            position: absolute;
            top: 0;
            left: 0;
            height: 18px;
            width: 18px;
            background-color: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border);
            border-radius: 5px;
            transition: all 0.2s ease;
        }

        .chk-container:hover input ~ .checkmark {
            border-color: var(--primary);
        }

        .chk-container input:checked ~ .checkmark {
            background-color: var(--success);
            border-color: var(--success);
        }

        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
        }

        .chk-container input:checked ~ .checkmark:after {
            display: block;
        }

        .chk-container .checkmark:after {
            left: 5px;
            top: 2px;
            width: 5px;
            height: 8px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .task-details {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .task-title {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-main);
            transition: color 0.2s ease;
        }

        .task-desc {
            font-size: 0.82rem;
            color: var(--text-muted);
            line-height: 1.3;
        }

        /* Delete Button */
        .btn-delete {
            background: transparent;
            color: var(--text-muted);
            border: none;
            padding: 4px;
            cursor: pointer;
            box-shadow: none;
            width: auto;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .btn-delete:hover {
            color: var(--error);
            background: rgba(239, 68, 68, 0.1);
            transform: scale(1.1);
            box-shadow: none;
        }

        .msg-toast {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            text-align: center;
            display: none;
            animation: fadeIn 0.3s ease forwards;
        }

        .msg-toast.success {
            display: block;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #34d399;
        }

        .msg-toast.error {
            display: block;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div class="glow"></div>
<div class="glow-2"></div>

<div class="container">
    <!-- Nueva Tarea (Formulario) -->
    <div class="form-col">
        <h1>Tareas</h1>
        <p class="subtitle">Añade y administra tus actividades cotidianas.</p>
        
        <form id="taskForm" novalidate>
            <div class="form-group">
                <label for="title">Título de la Tarea</label>
                <input type="text" id="title" name="title" placeholder="Ej. Comprar víveres" required />
            </div>
            <div class="form-group">
                <label for="description">Descripción</label>
                <textarea id="description" name="description" rows="3" placeholder="Ej. Leche, huevos y frutas de temporada"></textarea>
            </div>
            
            <button type="submit" id="submitBtn">
                <span>Añadir Tarea</span>
                <div class="spinner" id="btnSpinner"></div>
            </button>
        </form>
        
        <div class="msg-toast" id="response"></div>
    </div>

    <!-- Lista de Tareas -->
    <div class="list-col">
        <h2>Mis Tareas</h2>
        <div class="tasks-container" id="tasksContainer">
            <div class="empty-state">Cargando tareas...</div>
        </div>
    </div>
</div>

<script>
    const form = document.getElementById('taskForm');
    const tasksContainer = document.getElementById('tasksContainer');
    const resp = document.getElementById('response');
    const submitBtn = document.getElementById('submitBtn');
    const btnSpinner = document.getElementById('btnSpinner');
    const btnText = submitBtn.querySelector('span');

    // Cargar tareas al iniciar
    document.addEventListener('DOMContentLoaded', fetchTasks);

    async function fetchTasks() {
        try {
            const r = await fetch('/api/tasks');
            const json = await r.json();
            
            if (json.success) {
                renderTasks(json.data);
            } else {
                tasksContainer.innerHTML = '<div class="empty-state">Error al cargar las tareas de la BD.</div>';
            }
        } catch (err) {
            tasksContainer.innerHTML = '<div class="empty-state">Error de conexión al servidor.</div>';
        }
    }

    function renderTasks(tasks) {
        if (!tasks || tasks.length === 0) {
            tasksContainer.innerHTML = '<div class="empty-state">No tienes tareas pendientes. ¡Buen trabajo!</div>';
            return;
        }

        tasksContainer.innerHTML = '';
        tasks.forEach(task => {
            const div = document.createElement('div');
            div.className = `task-item ${task.completed ? 'completed' : ''}`;
            div.id = `task-${task.id}`;
            div.innerHTML = `
                <div class="task-left">
                    <label class="chk-container">
                        <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${task.id}, this.checked)" />
                        <span class="checkmark"></span>
                    </label>
                    <div class="task-details">
                        <span class="task-title">${escapeHTML(task.title)}</span>
                        ${task.description ? `<span class="task-desc">${escapeHTML(task.description)}</span>` : ''}
                    </div>
                </div>
                <button class="btn-delete" onclick="deleteTask(${task.id})" title="Eliminar tarea">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                </button>
            `;
            tasksContainer.appendChild(div);
        });
    }

    // Agregar tarea
    form.addEventListener('submit', async e => {
        e.preventDefault();
        showToast('', 'none');

        const title = form.title.value.trim();
        const description = form.description.value.trim();

        if (!title) {
            showToast('El título de la tarea es obligatorio.', 'error');
            return;
        }

        submitBtn.disabled = true;
        btnSpinner.style.display = 'block';
        btnText.textContent = 'Guardando...';

        try {
            const r = await fetch('/api/tasks', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, description })
            });
            const json = await r.json();

            if (r.ok && json.success) {
                showToast('Tarea añadida con éxito.', 'success');
                form.reset();
                fetchTasks();
            } else {
                showToast(json.message || 'Error al guardar la tarea.', 'error');
            }
        } catch (err) {
            showToast('Error de red al intentar guardar.', 'error');
        } finally {
            submitBtn.disabled = false;
            btnSpinner.style.display = 'none';
            btnText.textContent = 'Añadir Tarea';
        }
    });

    // Actualizar estado de completado
    async function toggleTask(id, completed) {
        try {
            const r = await fetch(`/api/tasks/${id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ completed })
            });
            const json = await r.json();

            if (r.ok && json.success) {
                const item = document.getElementById(`task-${id}`);
                if (item) {
                    if (completed) {
                        item.classList.add('completed');
                    } else {
                        item.classList.remove('completed');
                    }
                }
            } else {
                showToast('No se pudo actualizar el estado de la tarea.', 'error');
                fetchTasks(); // Recargar para revertir estado visual
            }
        } catch (err) {
            showToast('Error de red al actualizar estado.', 'error');
            fetchTasks();
        }
    }

    // Eliminar tarea
    async function deleteTask(id) {
        if (!confirm('¿Estás seguro de que deseas eliminar esta tarea?')) return;
        try {
            const r = await fetch(`/api/tasks/${id}`, {
                method: 'DELETE'
            });
            const json = await r.json();

            if (r.ok && json.success) {
                showToast('Tarea eliminada.', 'success');
                fetchTasks();
            } else {
                showToast('No se pudo eliminar la tarea.', 'error');
            }
        } catch (err) {
            showToast('Error de red al eliminar.', 'error');
        }
    }

    function showToast(text, type) {
        resp.textContent = text;
        resp.className = `msg-toast ${type}`;
        if (type !== 'none') {
            setTimeout(() => {
                resp.style.display = 'none';
            }, 3000);
        }
    }

    function escapeHTML(str) {
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }
</script>
</body>
</html>
