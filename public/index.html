<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestor de Tareas — Damián</title>
  <meta name="description" content="Sistema de gestión de tareas personal. Organiza, prioriza y completa tus actividades diarias." />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Hoja de estilos separada (Capa de Vista) -->
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- Destellos decorativos de fondo -->
  <div class="glow glow-1" aria-hidden="true"></div>
  <div class="glow glow-2" aria-hidden="true"></div>

  <!-- ══════════════════════════════════════════════════════════════
       VISTA 1: AUTENTICACIÓN (Login / Registro)
       Se muestra cuando NO hay sesión activa.
  ══════════════════════════════════════════════════════════════════ -->
  <section id="authView" role="main" aria-label="Autenticación">
    <div class="card auth-card">

      <!-- Cabecera con foto y título -->
      <div class="auth-header">
        <img src="/images/profile.jpg" alt="Foto de perfil de Damián" class="auth-logo" />
        <h1 class="gradient-text">Gestor de Tareas</h1>
        <p>Organiza tu día, controla tu progreso.</p>
      </div>

      <!-- Tabs para alternar entre Login y Registro -->
      <div class="auth-tabs" role="tablist" aria-label="Modo de acceso">
        <button id="tabLogin" class="auth-tab active" role="tab" aria-selected="true" aria-controls="formLogin">
          Iniciar Sesión
        </button>
        <button id="tabRegister" class="auth-tab" role="tab" aria-selected="false" aria-controls="formRegister">
          Registrarse
        </button>
      </div>

      <!-- Formulario de Login -->
      <form id="formLogin" class="auth-form active" novalidate aria-label="Formulario de inicio de sesión">
        <div class="form-group">
          <label for="loginEmail">Correo electrónico</label>
          <input type="email" id="loginEmail" name="email"
                 placeholder="ejemplo@correo.com" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label for="loginPassword">Contraseña</label>
          <input type="password" id="loginPassword" name="password"
                 placeholder="Tu contraseña" autocomplete="current-password" required />
        </div>
        <button type="submit" id="btnLogin" class="btn-primary">
          <span>Iniciar Sesión</span>
          <div class="spinner" id="spinnerLogin" aria-hidden="true"></div>
        </button>
      </form>

      <!-- Formulario de Registro -->
      <form id="formRegister" class="auth-form" novalidate aria-label="Formulario de registro">
        <div class="form-group">
          <label for="regUsername">Nombre de usuario</label>
          <input type="text" id="regUsername" name="username"
                 placeholder="Ej. damian_dev" autocomplete="username" required />
        </div>
        <div class="form-group">
          <label for="regEmail">Correo electrónico</label>
          <input type="email" id="regEmail" name="email"
                 placeholder="ejemplo@correo.com" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label for="regPassword">Contraseña <small>(mín. 6 caracteres)</small></label>
          <input type="password" id="regPassword" name="password"
                 placeholder="Crea una contraseña" autocomplete="new-password" required />
        </div>
        <button type="submit" id="btnRegister" class="btn-primary">
          <span>Crear Cuenta</span>
          <div class="spinner" id="spinnerRegister" aria-hidden="true"></div>
        </button>
      </form>

      <!-- Toast de mensajes de auth -->
      <div id="toastAuth" class="toast" role="alert" aria-live="polite"></div>
    </div>
  </section>

  <!-- ══════════════════════════════════════════════════════════════
       VISTA 2: DASHBOARD DE TAREAS
       Se muestra cuando HAY sesión activa.
  ══════════════════════════════════════════════════════════════════ -->
  <section id="dashboardView" role="main" aria-label="Panel de tareas">
    <div class="card">

      <!-- Header del Dashboard -->
      <header class="dash-header">
        <div class="dash-brand">
          <img src="/images/profile.jpg" alt="Foto de Damián" class="dash-avatar" />
          <div class="dash-brand-text">
            <h2 class="gradient-text">Gestor de Tareas</h2>
            <span id="dashUsername">Cargando...</span>
          </div>
        </div>
        <button id="btnLogout" class="btn-logout" aria-label="Cerrar sesión">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Cerrar Sesión
        </button>
      </header>

      <!-- Cuerpo con 2 columnas: Formulario + Lista -->
      <div class="dash-body">

        <!-- Columna Izquierda: Nueva Tarea (Crear) -->
        <div class="dash-form-col">
          <h2>Nueva Tarea</h2>
          <p class="subtitle">Añade una actividad a tu lista.</p>

          <form id="taskForm" novalidate aria-label="Formulario de nueva tarea">
            <div class="form-group">
              <label for="taskTitle">Título <span aria-hidden="true">*</span></label>
              <input type="text" id="taskTitle" name="title"
                     placeholder="Ej. Revisar documentación de Node.js" required />
            </div>
            <div class="form-group">
              <label for="taskDesc">Descripción <small>(opcional)</small></label>
              <textarea id="taskDesc" name="description" rows="4"
                        placeholder="Detalles adicionales de la tarea..."></textarea>
            </div>
            <button type="submit" id="submitTask" class="btn-primary">
              <span>Agregar Tarea</span>
              <div class="spinner" id="spinnerTask" aria-hidden="true"></div>
            </button>
          </form>

          <!-- Toast de tareas -->
          <div id="toastTask" class="toast" role="alert" aria-live="polite"></div>
        </div>

        <!-- Columna Derecha: Lista de Tareas (Leer, Actualizar, Eliminar) -->
        <div class="dash-list-col">
          <h2>Mis Tareas</h2>
          <p id="tasksMeta" class="tasks-meta">Cargando...</p>

          <div id="tasksContainer" class="tasks-scroll" role="list" aria-label="Lista de tareas">
            <div class="empty-state">Cargando tareas...</div>
          </div>
        </div>

      </div><!-- /.dash-body -->
    </div><!-- /.card -->
  </section>

  <!-- Scripts separados (Capa de Vista) — tasks.js primero para que fetchTasks esté disponible en auth.js -->
  <script src="/js/tasks.js"></script>
  <script src="/js/auth.js"></script>

</body>
</html>
